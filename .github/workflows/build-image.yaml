name: Build image

on:
  push:
  workflow_dispatch:

# Cancel previous runs when a new commit is pushed.
concurrency:
  group: ${{ github.workflow_ref }}
  cancel-in-progress: true

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      # renovate: docker=nginx
      NGINX_VERSION: 1.30.0-alpine-slim

    steps:
      - name: Get latest code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to container registry
        uses: docker/login-action@v4
        with:
          username: agross
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Log in ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata from build
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            name=ghcr.io/${{ github.repository }}
            # Do not push to Docker Hub for e.g. PR builds.
            name=${{ github.repository }},enable=${{ github.ref_name == github.event.repository.default_branch }}
          # Generate Docker tags based on the following events/attributes.
          # https://github.com/docker/metadata-action#tags-input
          tags: |
            type=ref,event=pr
            type=ref,event=branch,enable={{ is_not_default_branch }}
            type=raw,value=${{ env.NGINX_VERSION }},enable={{ is_default_branch }}
            # Set latest tag for the default branch.
            type=raw,value=latest,enable={{ is_default_branch }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            "NGINX_VERSION=${{ env.NGINX_VERSION }}"
